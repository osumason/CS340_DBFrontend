<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendors</title>
    <link rel="stylesheet" href="./App.css">
</head>


  <body>
    <nav class="navBar">
      <a href="/"> Home </a>
      <a href="/Customers.html"> Customers </a>
      <a href="/Vendors.html"> Vendors </a>
      <a href="/Products.html"> Products </a>
      <a href="/Orders.html"> Orders </a>
      <a href="/AddOrderDetails.html"> Add Order Details </a>
    </nav>



    <div class="page">
      <h2>Add Vendor</h2>
      <form class="form" action="/Vendors" method="POST">
        <label>Name: <input type="text" name="vendorName" /></label>
        <label>Phone Number: <input type="text" name="phoneNumber" /></label>
        <label>Email: <input type="email" name="contactEmail" /></label>
        <button type="submit" class="submitButton">Add Vendor</button>
      </form>
    </div>


    <div class="page">
      <h2>Update Vendor</h2>
       <p> The goal will be to allow searching of records by ID or name </p>   
      <form class="form" action="/Vendors" method="POST">
        <label>New Name: <input type="text" name="vendorName" /></label>
        <label>New Phone Number: <input type="text" name="phoneNumber" /></label>
        <label>New Email: <input type="email" name="contactEmail" /></label>
        <button type="submit" class="submitButton">Update Vendor</button>
      </form>
    </div>


     <div class="page">
      <h2>Delete Vendor</h2>
    <p> The goal will be to allow searching of records by ID or name </p>
      <form class="form" action="/Vendors" method="DELETE">
        <label>Vendor ID: <input type="text" name="vendorID" /></label>
        <label>Name: <input type="text" name="vendorName" /></label>
        <button type="submit" class="submitButton">Delete Vendor</button>
      </form>
    </div>

  </body>
</html>
