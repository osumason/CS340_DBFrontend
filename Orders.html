    <div class="page">
      <h2>Add Order</h2>
      <p>Since this is a transaction record, we don't want it to be modifiable</p>
      <form class="form" action="/Orders" method="POST">
        <label>Order Date: <input type="date" name="orderDate" /></label>
        <label>Total Cost: <input type="number" name="totalCost" /></label>
        <label>Customer ID: <input type="number" name="customerID" /></label>
        <button type="submit" class="submitButton">Add Order</button>
      </form>
    </div>
